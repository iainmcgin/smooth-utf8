name: Publish to crates.io

# Publishes smoothutf8 to crates.io.
#
# Auth: uses the CARGO_REGISTRY_TOKEN secret when present (bootstrap path —
# crates.io can't configure Trusted Publishing for a crate that doesn't exist
# yet), otherwise exchanges the GitHub OIDC token for a short-lived crates.io
# token. Once Trusted Publishing is configured for the crate and the secret is
# removed, publishes run entirely over OIDC with no stored credentials.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      dry_run:
        description: Run cargo publish --dry-run (no upload, no auth).
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write  # OIDC for crates.io Trusted Publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: crates-io
    env:
      DRY_RUN_FLAG: ${{ inputs.dry_run && '--dry-run' || '' }}
      # Surfaced as an env var so it can be tested in a step `if:` (the
      # `secrets` context is not always available there).
      HAS_BOOTSTRAP_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN != '' }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Authenticate (Trusted Publishing)
        id: auth
        if: ${{ !inputs.dry_run && env.HAS_BOOTSTRAP_TOKEN != 'true' }}
        uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe # v1.0.4

      - name: Publish smoothutf8
        env:
          # Prefer the short-lived OIDC token; fall back to the bootstrap
          # secret. Passed via step env (not GITHUB_ENV) so the value never
          # touches the runner-wide environment file.
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token || secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -o pipefail
          cargo publish $DRY_RUN_FLAG 2>&1 | tee /tmp/publish.log
          status=${PIPESTATUS[0]}
          if [ $status -ne 0 ] && grep -qE "already (exists|uploaded)" /tmp/publish.log; then
            echo "::notice::smoothutf8 already published at this version; skipping"
            exit 0
          fi
          exit $status

name: Build verification tools image

# Builds the Verus toolchain image and pushes it to GHCR. Runs only when
# the recipe or the pinned Verus revision changes, or on manual dispatch.

on:
  workflow_dispatch:
    inputs:
      verus_rev:
        description: 'Verus commit (github.com/verus-lang/verus)'
        required: false
  push:
    branches: [main]
    paths: ['verify/Dockerfile.tools']

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/${{ github.repository }}/verify-tools

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve revision
        id: revs
        env:
          IN_VS: ${{ inputs.verus_rev }}
        run: |
          vs=${IN_VS:-$(grep '^ARG VERUS_REV=' verify/Dockerfile.tools | cut -d= -f2)}
          if ! printf '%s' "$vs" | grep -Eq '^[0-9a-f]{7,40}$'; then
            echo "::error::revision '$vs' is not a bare git SHA"; exit 1
          fi
          echo "vs=$vs"               >> "$GITHUB_OUTPUT"
          echo "tag=verus-${vs:0:12}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: verify/Dockerfile.tools
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}:${{ steps.revs.outputs.tag }}
            ${{ env.IMAGE_BASE }}:latest
          build-args: |
            VERUS_REV=${{ steps.revs.outputs.vs }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha,scope=verify-tools
          cache-to:   type=gha,scope=verify-tools,mode=max

      # GitHub's attestation API and Sigstore keyless signing both require
      # the repo to be public (the OIDC identity is the repo path). Skip
      # while private; the image is still pushed and usable by CI.
      - name: Attest build provenance
        if: ${{ github.event.repository.visibility == 'public' }}
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.IMAGE_BASE }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - uses: sigstore/cosign-installer@7e8b541eb2e61bf99390e1afd4be13a184e9ebc5 # v3.10.1
        if: ${{ github.event.repository.visibility == 'public' }}
      - name: Sign image
        if: ${{ github.event.repository.visibility == 'public' }}
        env:
          IMAGE_DIGEST: ${{ env.IMAGE_BASE }}@${{ steps.build.outputs.digest }}
        run: cosign sign --yes "$IMAGE_DIGEST"

      - name: Summary
        env:
          IMAGE_BASE: ${{ env.IMAGE_BASE }}
          TAG: ${{ steps.revs.outputs.tag }}
          VS:  ${{ steps.revs.outputs.vs }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          {
            echo "### Verification tools image"
            echo "| | |"
            echo "|---|---|"
            echo "| Image | \`${IMAGE_BASE}:${TAG}\` |"
            echo "| Digest | \`${DIGEST}\` |"
            echo "| Verus | \`${VS}\` |"
            echo "| Platforms | \`linux/amd64\` |"
          } >> "$GITHUB_STEP_SUMMARY"
